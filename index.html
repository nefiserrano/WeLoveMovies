<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="We Love Movies is a personal movie tracker. Add movies to your 'To Watch' list, mark them as 'Watched', and keep all your movie notes in one place.">
    <meta name="author" content="Nefi Serrano and Mariela Matute">
    <title>We Love Movies</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <header>
        <h1>🎬 We Love Movies</h1>
        <p>Track, organize, and discover your next favorite film.</p>
        <nav class="nav-container">
    <label for="app-nav" class="menu-label">Navigate To:</label>
    <select id="app-nav" class="nav-menu" onchange="location = this.value;">
        <option value="#movie-form">Add a Movie</option>
        <option value="#to-watch-container">To Watch List</option>
        <option value="#watched-container">Watched Movies</option>
    </select>
</nav>
    </header>
    <main> 
        <section>
            <div>
                <h2>Add a Movie</h2>
                <form id="movie-form">
                    <div>
                        <label for="movie-title">Movie Title *</label>
                        <input type="text" id="movie-title" required placeholder="e.g., Inception">
                        <button type="button" id="omdb-fetch-btn">Auto-Fill from OMDb</button>
                    </div>
                    <div>
                        <label for="movie-year">Release Year</label>
                        <input type="number" id="movie-year" min="1888" max="2030" placeholder="e.g., 2010">
                    </div>
                    <div>
                        <label for="movie-genre">Genre *</label>
                        <select id="movie-genre" required>
                            <option value="">-- Select Genre --</option>
                            <option value="Action">Action</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Drama">Drama</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Thriller">Thriller</option>
                        </select>
                    </div>
                    <div>
                        <label for="movie-status">Status</label>
                        <select id="movie-status">
                            <option value="To Watch">To Watch</option>
                            <option value="Watched">Watched</option>
                        </select>
                    </div>
                    <div>
                        <label for="movie-rating">Your Rating (1-10)</label>
                        <input type="number" id="movie-rating" min="1" max="10">
                    </div>
                    <div>
                        <label for="movie-notes">Notes</label>
                        <textarea id="movie-notes" rows="3" placeholder="Add details or thoughts..."></textarea>
                    </div>
                    <button type="submit">Save Movie</button>
                </form>
            </div>
            <div>
                <h2>Filter & Sort</h2>
                <form>
                    <div>
                        <label for="search-input">Search Title</label>
                        <input type="text" id="search-input" placeholder="Type to search...">
                    </div>
                    <div>
                        <label for="filter-genre">Filter by Genre</label>
                        <select id="filter-genre">
                            <option value="all">All Genres</option>
                            <option value="Action">Action</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Drama">Drama</option>
                            <option value="Thriller">Thriller</option>
                        </select>
                    </div>
                    <div>
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by">
                            <option value="title">Title (A-Z)</option>
                            <option value="year">Year</option>
                            <option value="rating">Rating</option>
                        </select>
                    </div>
                </form>
            </div>
        </section>
        <hr>
        <section>
            <div>
                <h2>To Watch List</h2>
                <div id="to-watch-container">
                    <p>Add a movie to your watch list!</p>
                </div>
            </div>
            <div>
                <h2>✅ Watched Movies</h2>
                <div id="watched-container">
                    <p>No movies watched yet.</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 We Love Movies App</p>
    </footer>
</body>
</html>
